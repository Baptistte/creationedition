[build]
  # Dossier de publication (racine du site)
  publish = "."
  command = "npm install && npm run build"

# Page 404 personnalisée
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  
[build.environment]
  # Variables d'environnement pour Netlify
  NODE_VERSION = "20.12.2"
  # Ignorer les fichiers de documentation dans le scan de secrets
  SECRETS_SCAN_OMIT_PATHS = "*.md,guideMD/**"

# Configuration des fonctions serverless
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Configuration des headers pour la sécurité et les performances
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://*.elfsight.com https://*.elfsightcdn.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.elfsight.com https://*.elfsightcdn.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; frame-src https://v.calameo.com https://www.calameo.com; connect-src 'self' https://api.emailjs.com https://*.elfsight.com https://*.elfsightcdn.com; object-src 'none';"
    Cache-Control = "public, max-age=3600, must-revalidate"

# Headers pour les assets statiques (cache long)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers pour les images (cache moyen)
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

