<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Messages — CRM Création Édition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/admin.css">
    <style>
        /* La page messages utilise un layout pleine hauteur différent */
        body { overflow: hidden; height: 100vh; }
        .main-content { padding: 0; display: flex; flex-direction: column; height: 100vh; }
    </style>
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-inner">
                <div class="sidebar-logo-mark">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                </div>
                <div>
                    <div class="sidebar-logo-name">Création Édition</div>
                    <div class="sidebar-logo-sub">Administration</div>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Menu</div>

            <a href="./dashboard.html" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                </svg>
                Dashboard
            </a>

            <a href="./messages.html" class="nav-item active">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                Messages
                <span class="nav-badge" id="navBadge" style="display:none">0</span>
            </a>

            <a href="./clients.html" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
                </svg>
                Clients
            </a>

            <a href="./devis.html" class="nav-item">
                <svg class="nav-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Devis
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-user" onclick="handleLogout()">
                <div class="sidebar-user-avatar" id="sidebarAvatar">A</div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" id="sidebarName">—</div>
                    <div class="sidebar-user-role">Administrateur</div>
                </div>
                <button class="sidebar-logout-btn" title="Déconnexion">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

        <!-- Topbar messages -->
        <div class="messages-topbar">
            <div>
                <div class="messages-topbar-title">Messages reçus</div>
                <div class="messages-topbar-sub" id="topbarSub">—</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="loadMessages()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                </svg>
                Actualiser
            </button>
        </div>

        <!-- Split pane -->
        <div class="messages-split">

            <!-- Panneau gauche : liste -->
            <div class="msg-list-pane">

                <div class="msg-list-head">
                    <div class="msg-list-head-row">
                        <div class="msg-list-title">Boîte de réception</div>
                        <span class="unread-chip" id="unreadChip" style="display:none">0</span>
                    </div>
                    <div class="filter-pills" id="pills">
                        <button class="pill active" data-f="tous">Tous</button>
                        <button class="pill" data-f="nouveau">Nouveaux</button>
                        <button class="pill" data-f="lu">Lus</button>
                        <button class="pill" data-f="traite">Traités</button>
                        <button class="pill" data-f="archive">Archivés</button>
                    </div>
                </div>

                <div class="msg-search">
                    <div class="search-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="search" class="search-input" id="searchInput" placeholder="Nom, email, service…">
                    </div>
                </div>

                <div class="msg-list-body" id="msgList">
                    <div class="loading-state"><div class="loading"></div><span>Chargement…</span></div>
                </div>

            </div>

            <!-- Panneau droit : détail -->
            <div class="msg-detail-pane" id="detailPane">
                <div class="detail-empty">
                    <div class="detail-empty-ico">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                    <p>Sélectionner un message</p>
                    <span>Cliquez sur un message pour le lire</span>
                </div>
            </div>

        </div>

    </main>
</div>

<!-- Toast -->
<div class="toast" id="toast">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    <span id="toastMsg"></span>
</div>

<script type="module">
import { AuthManager, ApiClient } from './assets/js/auth.js';

await AuthManager.requireAuth();

const info = AuthManager.getAdminInfo();
if (info) {
    const name = `${info.prenom} ${info.nom}`;
    document.getElementById('sidebarName').textContent = name;
    document.getElementById('sidebarAvatar').textContent = info.prenom.charAt(0).toUpperCase();
}

window.handleLogout = () => {
    if (confirm('Se déconnecter ?')) AuthManager.logout();
};

// ── État ──────────────────────────────────────────
let all = [], filter = 'tous', query = '', activeId = null;

// ── Toast ─────────────────────────────────────────
function toast(msg, type = '') {
    const el = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Couleur avatar ─────────────────────────────────
const COLS = ['#6366f1','#8b5cf6','#ec4899','#10b981','#f59e0b','#3b82f6','#14b8a6','#f97316'];
function aColor(s) {
    let h = 0;
    for (const c of (s || '?')) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
    return COLS[h % COLS.length];
}
function initials(p, n) { return ((p || '?')[0] + (n || '')[0]).toUpperCase(); }

// ── Temps relatif ──────────────────────────────────
function relTime(ds) {
    if (!ds) return '';
    const d = new Date(ds);
    if (isNaN(d)) return '';
    const diff = Date.now() - d;
    if (diff < 86400000) return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    if (diff < 172800000) return 'Hier';
    if (diff < 604800000) return d.toLocaleDateString('fr-FR', { weekday: 'short' });
    return d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
}

function fullDate(ds) {
    if (!ds) return '—';
    const d = new Date(ds);
    return isNaN(d) ? '—' : d.toLocaleString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ── Badge statut ───────────────────────────────────
function sBadge(m) {
    if (m.archive) return `<span class="badge badge-neutral"><span class="badge-dot"></span>Archivé</span>`;
    const map = {
        nouveau:  ['badge-accent',   'Nouveau'],
        lu:       ['badge-neutral',  'Lu'],
        traite:   ['badge-success',  'Traité'],
    };
    const [c, l] = map[m.statut] || ['badge-neutral', m.statut || '—'];
    return `<span class="badge ${c}"><span class="badge-dot"></span>${l}</span>`;
}

// ── Filtrage ───────────────────────────────────────
function getFiltered() {
    return all.filter(m => {
        if (filter === 'archive') return !!m.archive;
        if (filter !== 'tous') {
            if (m.archive) return false;
            if (m.statut !== filter) return false;
        }
        if (query) {
            const q = query.toLowerCase();
            return (m.prenom + ' ' + m.nom).toLowerCase().includes(q)
                || (m.email || '').toLowerCase().includes(q)
                || (m.service_interesse || '').toLowerCase().includes(q)
                || (m.message || '').toLowerCase().includes(q);
        }
        return true;
    });
}

// ── Rendu liste ────────────────────────────────────
function renderList() {
    const list = document.getElementById('msgList');
    const msgs = getFiltered();

    if (!msgs.length) {
        list.innerHTML = `<div class="empty-state">
            <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div class="empty-state-title">${query ? 'Aucun résultat' : 'Boîte vide'}</div>
            <div class="empty-state-desc">${query ? 'Modifiez votre recherche' : 'Aucun message dans cette catégorie'}</div>
        </div>`;
        return;
    }

    list.innerHTML = msgs.map(m => {
        const col  = aColor(m.prenom + m.nom);
        const ini  = initials(m.prenom, m.nom);
        const prev = (m.message || '').substring(0, 100);
        const active = m.id === activeId;
        const unread = m.statut === 'nouveau';

        return `<div class="msg-card${unread ? ' is-unread' : ''}${active ? ' is-active' : ''}" data-id="${m.id}" onclick="selectMsg(${m.id})">
            <div class="msg-card-top">
                <div class="msg-avatar" style="background:${col}">${ini}</div>
                <div class="msg-meta">
                    <div class="msg-meta-row1">
                        <div class="msg-sender">${m.prenom || ''} ${m.nom || ''}</div>
                        <div class="msg-time">${relTime(m.date_reception)}</div>
                    </div>
                    <div class="msg-email">${m.email || ''}</div>
                    <div class="msg-preview">${prev}</div>
                </div>
            </div>
            <div class="msg-card-foot">
                ${sBadge(m)}
                ${m.service_interesse ? `<span class="badge badge-neutral" style="font-size:10px">${m.service_interesse}</span>` : ''}
                ${unread ? '<div class="unread-dot"></div>' : ''}
            </div>
        </div>`;
    }).join('');
}

// ── Rendu détail ───────────────────────────────────
function renderDetail(m) {
    const col = aColor(m.prenom + m.nom);
    const ini = initials(m.prenom, m.nom);
    document.getElementById('detailPane').innerHTML = `
        <div class="detail-header">
            <div class="detail-from">
                <div class="detail-avatar" style="background:${col}">${ini}</div>
                <div>
                    <div class="detail-name">${m.prenom || ''} ${m.nom || ''}</div>
                    <div class="detail-metas">
                        <div class="detail-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <a href="mailto:${m.email || ''}" style="color:inherit;text-decoration:none">${m.email || '—'}</a>
                        </div>
                        ${m.telephone ? `<div class="detail-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.62 9.8a19.79 19.79 0 01-3.07-8.68A2 2 0 012.54 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 9.91a16 16 0 006.17 6.17l1.28-.88a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                            <a href="tel:${m.telephone}" style="color:inherit;text-decoration:none">${m.telephone}</a>
                        </div>` : ''}
                        <div class="detail-meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            ${fullDate(m.date_reception)}
                        </div>
                        <div>${sBadge(m)}</div>
                    </div>
                </div>
            </div>
            <div class="detail-actions">
                ${(m.statut !== 'lu' && m.statut !== 'traite' && !m.archive) ? `<button class="btn btn-secondary btn-sm" onclick="doLu(${m.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Marquer lu
                </button>` : ''}
                ${(m.statut !== 'traite' && !m.archive) ? `<button class="btn btn-primary btn-sm" onclick="doTraite(${m.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Traité
                </button>` : ''}
                ${!m.archive ? `<button class="btn btn-secondary btn-sm" onclick="doArchive(${m.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>Archiver
                </button>` : ''}
                <button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="doDelete(${m.id})">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
                </button>
            </div>
        </div>
        <div class="detail-body">
            ${m.service_interesse ? `<div class="detail-service-chip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
                ${m.service_interesse}
            </div>` : ''}
            <div class="detail-bubble">${(m.message || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
        </div>`;
}

function resetDetail() {
    document.getElementById('detailPane').innerHTML = `
        <div class="detail-empty">
            <div class="detail-empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <p>Sélectionner un message</p><span>Cliquez sur un message pour le lire</span>
        </div>`;
}

// ── Sélection ──────────────────────────────────────
window.selectMsg = (id) => {
    activeId = id;
    const m = all.find(x => x.id === id);
    if (!m) return;
    document.querySelectorAll('.msg-card').forEach(el => el.classList.toggle('is-active', +el.dataset.id === id));
    renderDetail(m);
    if (m.statut === 'nouveau') doLu(id, false);
};

// ── Actions ────────────────────────────────────────
window.doLu = async (id, feedback = true) => {
    try {
        await ApiClient.request('messages', { method: 'PUT', body: JSON.stringify({ id, lu: true, statut: 'lu' }) });
        if (feedback) toast('Marqué comme lu', 'ok');
        await loadMessages(false);
    } catch { toast('Erreur', 'err'); }
};

window.doTraite = async (id) => {
    try {
        await ApiClient.request('messages', { method: 'PUT', body: JSON.stringify({ id, statut: 'traite', lu: true }) });
        toast('Marqué comme traité', 'ok');
        await loadMessages(false);
    } catch { toast('Erreur', 'err'); }
};

window.doArchive = async (id) => {
    if (!confirm('Archiver ce message ?')) return;
    try {
        await ApiClient.request('messages', { method: 'PUT', body: JSON.stringify({ id, archive: true }) });
        toast('Message archivé', 'ok');
        activeId = null; resetDetail();
        await loadMessages(false);
    } catch { toast('Erreur', 'err'); }
};

window.doDelete = async (id) => {
    if (!confirm('Supprimer définitivement ? Cette action est irréversible.')) return;
    try {
        await ApiClient.request('messages', { method: 'DELETE', body: JSON.stringify({ id }) });
        toast('Message supprimé', 'ok');
        activeId = null; resetDetail();
        await loadMessages(false);
    } catch { toast('Erreur', 'err'); }
};

// ── Chargement ─────────────────────────────────────
window.loadMessages = async (spinner = true) => {
    if (spinner) document.getElementById('msgList').innerHTML = `<div class="loading-state"><div class="loading"></div><span>Chargement…</span></div>`;
    try {
        const data = await ApiClient.request('messages', { method: 'GET' });
        all = data.data || data.messages || [];
        all.sort((a, b) => {
            if (a.statut === 'nouveau' && b.statut !== 'nouveau') return -1;
            if (b.statut === 'nouveau' && a.statut !== 'nouveau') return 1;
            return new Date(b.date_reception) - new Date(a.date_reception);
        });

        const nonLus = all.filter(m => m.statut === 'nouveau').length;

        const nb = document.getElementById('navBadge');
        nb.textContent = nonLus; nb.style.display = nonLus ? '' : 'none';

        const uc = document.getElementById('unreadChip');
        uc.textContent = nonLus; uc.style.display = nonLus ? '' : 'none';

        document.getElementById('topbarSub').textContent =
            `${all.length} message${all.length !== 1 ? 's' : ''} · ${nonLus} non lu${nonLus !== 1 ? 's' : ''}`;

        renderList();

        if (activeId) {
            const m = all.find(x => x.id === activeId);
            m ? renderDetail(m) : resetDetail();
        }
    } catch (e) {
        console.error(e);
        toast('Erreur de chargement', 'err');
        document.getElementById('msgList').innerHTML = `<div class="empty-state"><div class="empty-state-title">Erreur</div><div class="empty-state-desc">${e.message}</div></div>`;
    }
};

// ── Événements ─────────────────────────────────────
document.getElementById('pills').addEventListener('click', e => {
    const btn = e.target.closest('.pill');
    if (!btn) return;
    filter = btn.dataset.f;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    renderList();
});

document.getElementById('searchInput').addEventListener('input', e => {
    query = e.target.value.trim();
    renderList();
});

// ── Init ───────────────────────────────────────────
loadMessages();
setInterval(() => loadMessages(false), 30000);
</script>

</body>
</html>
